name: Generate Profile Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Ensure assets directory exists
        run: mkdir -p assets

      - name: Generate github-readme-stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=hj6hki123&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=22D3EE&icon_color=A855F7&text_color=CBD5E1&ring_color=7C3AED&count_private=true&include_all_commits=true&rank_icon=percentile
          path: assets/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate github-readme-stats top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=hj6hki123&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=22D3EE&text_color=CBD5E1&layout=donut&langs_count=8&size_weight=0.5&count_weight=0.5&exclude_repo=hj6hki123,klooom
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metrics overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: hj6hki123
          filename: assets/metrics.base.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Taipei
          config_animations: yes
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_habits: yes
          plugin_habits_days: 7
          plugin_habits_facts: yes
          plugin_habits_charts: no

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: hj6hki123
          outputs: assets/snake.svg?palette=github-dark

      - name: Generate static jokes card
        run: |
          curl -fsSL "https://readme-jokes.vercel.app/api?theme=tokyonight&hideBorder&qColor=%2322D3EE&aColor=%23A855F7&textColor=%23CBD5E1&codeColor=%23F8FAFC" -o assets/jokes.svg

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git add README.md .github/workflows/profile-assets.yml
          git diff --cached --quiet || git commit -m "chore: update generated profile assets"
          git push
